name: OpenTofu Apply

on:
  push:
    branches:
      - main
    paths:
      - 'opentofu/**'
      - '.github/workflows/opentofu-apply.yml'

env:
  TOFU_VERSION: '1.6.0'
  WORKING_DIR: './opentofu/dev'

jobs:
  opentofu-apply:
    name: Apply Infrastructure
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # requerido para Workload Identity Federation

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/647757978174/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "cv-cicd@project-38c56a6f-24a9-45fb-aef.iam.gserviceaccount.com"

      - name: OpenTofu Init
        run: |
          tofu init \
            -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-computer_vision_yolo" \
            -backend-config="prefix=opentofu/state/dev"

      # Stage 1: asegura que la instancia Cloud SQL exista antes del plan completo.
      # Si google_sql_database / google_sql_user están en state pero la instancia
      # fue eliminada externamente, el plan falla con 404 al refrescarlos.
      # Aplicando la instancia primero (no-op si ya existe) el plan completo funciona.
      - name: OpenTofu Apply — Cloud SQL instance (pre-requisito)
        run: |
          tofu apply -auto-approve \
            -target='google_sql_database_instance.postgres[0]' \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: OpenTofu Plan
        run: |
          tofu plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan

      - name: OpenTofu Apply
        run: tofu apply -auto-approve tfplan

      - name: Show Outputs
        run: |
          echo "## Infrastructure Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** $(tofu output -raw bucket_name 2>/dev/null || echo n/a)" >> $GITHUB_STEP_SUMMARY
          echo "**DB connection name:** $(tofu output -raw db_instance_connection_name 2>/dev/null || echo n/a)" >> $GITHUB_STEP_SUMMARY
          echo "**DB IP:** $(tofu output -raw db_public_ip 2>/dev/null || echo n/a)" >> $GITHUB_STEP_SUMMARY
          echo "**Cloud SQL Proxy SA:** $(tofu output -raw cloudsql_proxy_sa_email 2>/dev/null || echo n/a)" >> $GITHUB_STEP_SUMMARY
          echo "**GKE Connect:** $(tofu output -raw gke_connect_command 2>/dev/null || echo n/a)" >> $GITHUB_STEP_SUMMARY