name: OpenTofu Apply

on:
  push:
    branches:
      - main
    paths:
      - 'opentofu/**'
      - '.github/workflows/opentofu-apply.yml'

env:
  TOFU_VERSION: '1.6.0'
  WORKING_DIR: './opentofu/dev'

jobs:
  opentofu-apply:
    name: Apply Infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Authenticate to Google Cloud
        run: |
          echo "${{ secrets.GCP_SA_B64 }}" | base64 -d > /tmp/gcp-creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json" >> "$GITHUB_ENV"

      - name: OpenTofu Init
        run: |
          tofu init \
            -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-computer_vision_yolo" \
            -backend-config="prefix=opentofu/state/dev"

      - name: OpenTofu Plan
        run: |
          tofu plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan

      - name: OpenTofu Apply
        run: tofu apply -auto-approve tfplan

      - name: Show Outputs
        run: |
          echo "## Infrastructure Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** $(tofu output -raw bucket_name 2>/dev/null || echo n/a)" >> $GITHUB_STEP_SUMMARY
          echo "**DB IP:** $(tofu output -raw db_public_ip 2>/dev/null || echo n/a)" >> $GITHUB_STEP_SUMMARY
          echo "**GKE Connect:** $(tofu output -raw gke_connect_command 2>/dev/null || echo n/a)" >> $GITHUB_STEP_SUMMARY