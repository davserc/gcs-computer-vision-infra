name: OpenTofu Validate (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - 'opentofu/**'
      - '.github/workflows/opentofu-validate.yml'
      - '.github/workflows/opentofu-apply.yml'

env:
  TOFU_VERSION: '1.6.0'
  WORKING_DIR: './opentofu/dev'

permissions:
  contents: read
  pull-requests: write   # to post plan as PR comment

jobs:
  validate:
    name: fmt / validate / plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: OpenTofu Init
        run: tofu init -input=false

      - name: Check formatting
        run: tofu fmt -check -recursive

      - name: Validate configuration
        run: tofu validate

      - name: Plan (no apply)
        id: plan
        run: |
          tofu plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -no-color \
            -input=false \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan;
            try {
              plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            } catch (e) {
              plan = '⚠️ Plan output not available — a previous step may have failed.\n' + e.message;
            }
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n...(truncated)'
              : plan;
            const body = `## OpenTofu Plan\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
